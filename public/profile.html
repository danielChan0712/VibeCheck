<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | VibeCheck</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="profile">
  <div class="app-shell">
    <aside class="sidebar glass">
      <a class="brand-link" href="/home.html">
        <span class="logo-mini"></span>
        <strong>VibeCheck</strong>
      </a>

      <nav class="menu">
        <a class="menu-link" href="/home.html">Home</a>
        <a class="menu-link" href="/my-profile.html" id="myProfileLink">My Profile</a>
        <a class="menu-link" href="/settings.html">Settings</a>
        <a class="menu-link" href="#" id="logoutLink">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <section id="profileHeader" class="profile-hero glass"></section>

      <section class="panel glass">
        <div class="section-head">
          <h2>Creator videos</h2>
          <p class="muted">Open any card to watch the full video page.</p>
        </div>

        <div id="profileVideoGrid" class="video-grid"></div>
        <p id="profileMessage" class="status-text"></p>
      </section>
    </main>
  </div>

  <script src="/script.js" defer></script>
</body>
</html>
