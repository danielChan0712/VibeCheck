<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VibeCheck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <h1>🎬 VibeCheck</h1>
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
      </form>
      <p>Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></p>
      <div class="demo-box">
        <p><strong>Demo Accounts:</strong></p>
        <button onclick="demoLogin('sarah@test.com')">Login as Sarah (Artist)</button>
        <button onclick="demoLogin('alex@test.com')">Login as Alex (Music)</button>
        <button onclick="demoLogin('maya@test.com')">Login as Maya (Dance)</button>
      </div>
      <div id="message"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
