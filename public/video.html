<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video | VibeCheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="video">
  <div class="app-shell">
    <aside class="sidebar glass">
      <a class="brand-link" href="/home.html">
        <span class="logo-mini"></span>
        <strong>VibeCheck</strong>
      </a>

      <nav class="menu">
        <a class="menu-link" href="/home.html">Home</a>
        <a class="menu-link" href="/my-profile.html" id="myProfileLink">My Profile</a>
        <a class="menu-link" href="/settings.html">Settings</a>
        <a class="menu-link" href="#" id="logoutLink">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <section class="video-layout">
        <div class="video-player-panel glass" id="videoPlayerWrap"></div>

        <div class="panel glass">
          <div id="videoMeta"></div>

          <section class="comment-section">
            <div class="section-head">
              <h2>Comments</h2>
            </div>

            <form id="commentForm" class="comment-form">
              <input type="text" name="text" placeholder="Write a comment..." required>
              <button class="btn btn-primary" type="submit">Post comment</button>
            </form>

            <p id="commentMessage" class="status-text"></p>
            <div id="commentList" class="comment-list"></div>
          </section>

          <!-- Add after the comment section -->
          <section class="panel glass">
            <div class="section-head">
              <div>
                <h2>Recommended for you</h2>
                <p class="muted">Videos you might also like</p>
              </div>
            </div>
            <div id="recommendedGrid" class="video-grid"></div>
            <p id="recommendedMessage" class="status-text"></p>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="/script.js" defer></script>
</body>
</html>
